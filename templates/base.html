<!doctype html>
<html>
<head>
  <title>DigiSign Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      font-family: 'Segoe UI';
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      color: black;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .hero {
      text-align: center;
      margin-top: 20px;
    }

    .navbar {
      background: rgba(0,0,0,0.8);
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <span class="navbar-brand">🔐 DigiSign Professional</span>
  </div>
</nav>

<div class="container">

  <div class="hero">
    <h2>Digital Signature System</h2>
    <p>Securely Generate and Verify Digital Signatures using RSA Algorithm</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{cat}} mt-3">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}

</div>

</body>
</html>
