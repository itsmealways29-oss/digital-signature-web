{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="glass-card text-center p-5">
      
      <div style="font-size: 4rem; margin-bottom: 10px; animation: fadeInUp 0.5s ease;">🎉</div>
      <h3 style="font-weight: 700; color: #fff;">Key Pair Generated!</h3>
      <p style="color: #94a3b8; margin-bottom: 30px;">Your mathematically secure RSA 2048-bit keys have been created successfully. Download them below and store them securely.</p>

      <div class="d-grid gap-3">
        <a href="/download/private.pem" class="btn btn-custom btn-gradient-danger btn-lg w-100">
          <span style="margin-right: 8px;">🔒</span> Download Private Key
        </a>
        <a href="/download/public.pem" class="btn btn-custom btn-gradient-success btn-lg w-100">
          <span style="margin-right: 8px;">🌍</span> Download Public Key
        </a>
      </div>

      <div class="mt-4 pt-3 border-top" style="border-color: rgba(255,255,255,0.1) !important;">
        <a href="/" class="btn btn-outline-light rounded-pill px-4" style="border-color: rgba(255,255,255,0.3);">
          ⬅ Return Home
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
